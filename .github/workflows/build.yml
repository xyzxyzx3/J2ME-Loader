name: Smart Android APK Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Repo çek
    - name: Checkout
      uses: actions/checkout@v4

    # 2. Java kur
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    # 3. Android SDK
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    # 4. Gradle cache
    - name: Setup Gradle cache
      uses: gradle/actions/setup-gradle@v3

    # 5. Gradlew permission fix
    - name: Make gradlew executable
      run: chmod +x gradlew

    # 6. Build APK
    - name: Build APK
      run: ./gradlew assembleDebug --no-daemon

    # 7. SMART APK FINDER (asıl olay)
    - name: Find APK automatically
      id: apk
      run: |
        APK_PATH=$(find . -type f -name "*.apk" | head -n 1)
        echo "APK found at: $APK_PATH"
        echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT

    # 8. Upload artifact (dinamik path)
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: ${{ steps.apk.outputs.apk_path }}
